# Example YAML alternative to creating everything below as UI Helpers.
# Merge the top-level keys (`input_datetime:`, `template:`,
# `input_number:`) into configuration.yaml (or a packages file).
# input_number/input_datetime need a full Home Assistant restart to take
# effect; template changes just need Developer Tools > YAML > Reload
# Template Entities. Shown for both electricity and gas - delete the
# gas_* entries if you're electricity-only.
#
# This file is split into REQUIRED and OPTIONAL. Everything in REQUIRED
# is needed no matter what. OPTIONAL is only needed if you don't already
# have an entity that reports today's standing charge - many energy
# supplier integrations expose this directly (see the README's "Using a
# supplier integration for the rate" section - Octopus Energy, for
# example, exposes sensor.octopus_energy_electricity_..._current_standing_charge).
# If you have one of those, skip the OPTIONAL section entirely and point
# the blueprint's rate field at that sensor instead.
#
# One YAML wrinkle: `input_number:` can only appear once per config, so
# the OPTIONAL entries below can't be their own separate top-level
# section - they have to live inside the same input_number: block as the
# REQUIRED ones. That's why input_number: is last in this file and has
# its own REQUIRED/OPTIONAL divider inside it, rather than the whole
# OPTIONAL group being a clean standalone block like the others.

# =====================================================================
# REQUIRED
# =====================================================================

# input_datetime: catch-up bookkeeping for the blueprint - stores the
# last date it successfully ran per fuel.
#
# IMPORTANT: set `initial:` to YESTERDAY's date (relative to whenever you
# actually deploy this), not today, and not left out entirely. Home
# Assistant has no way to leave a Date helper truly blank on creation -
# omitting `initial:` here still results in it defaulting to today's
# date the first time it's loaded, same as the UI helper creation dialog
# does. If it's left at today, the blueprint thinks today's charge is
# already accounted for and silently skips it until the day after setup.
# Replace the placeholder dates below with the real date before merging
# this into your config.
input_datetime:
  electricity_standing_charge_last_accrual:
    name: Electricity Standing Charge Last Accrual
    has_date: true
    has_time: false
    initial: "2026-07-02" # <-- replace with yesterday's actual date
  gas_standing_charge_last_accrual:
    name: Gas Standing Charge Last Accrual
    has_date: true
    has_time: false
    initial: "2026-07-02" # <-- replace with yesterday's actual date

# template: two sensors per fuel - a read-only "Total" sensor tagged
# device_class: monetary that mirrors the input_number "_accrued" total
# below (this is what you register with the Energy Dashboard as
# "entity tracking total cost"), and a dummy "Usage" sensor that always
# reports 0 (the zero-usage source the cost is attached to). These are
# NOT the same entities as the input_number they read from, despite
# similar names (_total vs _accrued) - don't confuse them when
# configuring the blueprint or the Energy Dashboard.
template:
  - sensor:
      - name: "Electricity Standing Charge Total"
        unique_id: electricity_standing_charge_total_cost
        unit_of_measurement: "GBP"
        device_class: monetary
        state_class: total
        state: "{{ states('input_number.electricity_standing_charge_accrued') | float(0) }}"

      - name: "Electricity Standing Charge Usage"
        unique_id: electricity_standing_charge_dummy_usage
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: "0"

      - name: "Gas Standing Charge Total"
        unique_id: gas_standing_charge_total_cost
        unit_of_measurement: "GBP"
        device_class: monetary
        state_class: total
        state: "{{ states('input_number.gas_standing_charge_accrued') | float(0) }}"

      # unit_of_measurement and device_class below must be a matching
      # pair - either ("m³", gas) as shown, or ("kWh", energy) if your
      # real gas meter already reports in kWh and you'd rather match it.
      # Mixing them (e.g. kWh with device_class: gas) shows an
      # "Unexpected unit of measurement" warning in the Energy Dashboard.
      - name: "Gas Standing Charge Usage"
        unique_id: gas_standing_charge_dummy_usage
        unit_of_measurement: "m³"
        device_class: gas
        state_class: total
        state: "0"

input_number:
  # --- REQUIRED ---
  # The running total the blueprint automation writes to directly. This
  # is the entity you point the blueprint's "Cumulative Total Entity"
  # field at.
  electricity_standing_charge_accrued:
    name: Electricity Standing Charge Accrued
    min: 0
    max: 100000
    step: 0.0001
    unit_of_measurement: "GBP"
  gas_standing_charge_accrued:
    name: Gas Standing Charge Accrued
    min: 0
    max: 100000
    step: 0.0001
    unit_of_measurement: "GBP"

  # --- OPTIONAL ---
  # Only needed if you don't already have an entity exposing today's
  # standing charge - see the note at the top of this file. If you're
  # skipping these, don't add them here at all; just point the
  # blueprint's rate field at your supplier's sensor instead.
  electricity_standing_charge_rate:
    name: Electricity Standing Charge Rate
    min: 0
    max: 10
    step: 0.0001
    unit_of_measurement: "GBP"
  gas_standing_charge_rate:
    name: Gas Standing Charge Rate
    min: 0
    max: 10
    step: 0.0001
    unit_of_measurement: "GBP"
